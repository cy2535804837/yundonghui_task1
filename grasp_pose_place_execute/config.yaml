# CLI parameters for this module. Keys are argparse dests (the long
# flag with leading -- removed and dashes turned into underscores).
# Edit values here instead of typing them on the command line.
# Explicit command-line flags still override these values.
# Regenerate with:  python3 -m <module>.main --write-config

acc_scale: 0.2
# --- compliant (F/T admittance) set-down -------------------------------------
# Reuses compliant_grasp_execute's admittance stack + F/T calibration so the
# final descent is soft and STOPS on table/object contact instead of driving
# into the table. Only the common toggles are listed; every --compliant-* flag
# is still accepted on the CLI / can be added here.
compliant_force_deadzone: 0.5        # 必须 < contact_force_n(0.5)
compliant_contact_debounce: 1        # 默认 3，改 1 更快确认
compliant_min_insert_m: 0.004
compliant_max_vel: 0.05
compliant_place: true
compliant_place_extra_drop_m: 0.02
compliant_final_descent_m: 0.06
compliant_contact_force_n: 1.5
compliant_max_insert_m: 0.1
# descent speed of the compliant set-down (faster than the grasp insert: setting
# an object down on the table tolerates more speed than a delicate pick)
compliant_insert_speed_mps: 0.02
compliant_max_lag_m: 0.035
ft_topic_left: /arm_6dof_left
ft_topic_right: /arm_6dof_right
ft_calib_left: ''
ft_calib_right: ''
approach_along_axis: false
approach_dist: 0.12
approach_extra_z: 0.05
approach_dx: 0.0
approach_dy: 0.0
approach_dz: 0.06
# Split a large home->place-orientation swing (fixed place orientation can be
# ~76deg from home) into SLERP hops so each QP approach hop stays under the
# controller tracking limit (目标超出跟踪限). 0 disables (single-shot approach).
approach_max_reorient_deg: 35.0
arm: auto
dry_run: false
gripper_activate_on_connect: true
gripper_async_connect: true
gripper_backend: modbus_rtu
gripper_force_activate: false
gripper_force_pct: 50.0
gripper_open_pct: 0.0
gripper_port_cache: /tmp/robotiq_gripper_port.txt
gripper_recv_timeout_ms: 500
gripper_serial_port: auto
gripper_server_get_port: 4245
gripper_server_ip: 127.0.0.1
gripper_server_set_port: 4244
gripper_settle_s: 0.001
gripper_slave_id: 9
gripper_speed_pct: 40.0
gripper_wait_timeout_s: 8.0
handoff_in: /tmp/grasp_handoff.json
handoff_out: /tmp/grasp_handoff.json
