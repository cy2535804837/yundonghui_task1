place_mid_left_joints:  [  0.258,  0.673,   -0.156,  -2.056,   -1.152,  -0.043,  0.320]
place_mid_right_joints: [  0.258,  -0.673,   0.156,  -2.056,   1.152,  -0.043,  -0.320]
